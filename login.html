<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · Presensi SDM Kampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f4fa; }
        .login-card {
            background: #ffffff;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .fingerprint-icon {
            background: linear-gradient(145deg, #1a365d, #0f2440);
        }
        .input-focus-ring:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.2);
            border-color: #1a365d;
        }
        .btn-primary {
            background: #1a365d;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background: #122b4a;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px -8px rgba(26,54,93,0.4);
        }
        .role-badge {
            background: #eef3f9;
            color: #1a365d;
            font-weight: 500;
            padding: 0.25rem 0.85rem;
            border-radius: 999px;
            font-size: 0.65rem;
            letter-spacing: 0.3px;
        }
        .role-quick-btn {
            font-size: 0.7rem;
            font-weight: 500;
            background: #f8fafc;
            border: 1px solid #e5e9f0;
            border-radius: 10px;
            padding: 0.5rem 0.25rem;
            color: #374151;
            transition: all 0.15s ease;
            cursor: pointer;
        }
        .role-quick-btn:hover {
            border-color: #1a365d;
            background: #edf3fa;
            transform: translateY(-1px);
        }
        .role-quick-btn:active {
            transform: scale(0.97);
        }
        .footer-divider {
            background: linear-gradient(90deg, transparent, #dce3ec, transparent);
            height: 1px;
        }
        @media (max-width: 480px) {
            .login-card { padding: 1.75rem 1.25rem; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-6">

    <div class="w-full max-w-md login-card rounded-3xl shadow-xl p-7 md:p-9 transition-all">

        <!-- Header -->
        <div class="flex flex-col items-center text-center">
            <div class="fingerprint-icon w-20 h-20 rounded-2xl flex items-center justify-center shadow-lg mb-4">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <path d="M12 2a6 6 0 0 0-6 6v3a6 6 0 0 0 12 0V8a6 6 0 0 0-6-6z" />
                    <path d="M12 18v3" />
                    <path d="M8 21h8" />
                    <path d="M6 11a6 6 0 0 0 12 0" />
                    <path d="M8 8a4 4 0 0 1 8 0" />
                    <path d="M10 13a2 2 0 1 1 4 0" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-[#1a365d] tracking-tight">Presensi SDM</h1>
            <p class="text-sm text-gray-500 mt-0.5 font-medium">Sistem Manajemen Terintegrasi Fingerprint</p>
            
            <!-- Role Badges -->
            <div class="mt-3 flex flex-wrap gap-1.5 justify-center">
                <span class="role-badge">Staf / Dosen</span>
                <span class="role-badge">Kaprodi</span>
                <span class="role-badge">OSDM</span>
                <span class="role-badge">Direktur</span>
                <span class="role-badge">Admin</span>
            </div>
        </div>

        <!-- Form -->
        <form id="loginForm" class="mt-6 space-y-4">
            <!-- Username -->
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-1.5">Nama Pengguna</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </span>
                    <input type="text" id="username" value="admin"
                           class="w-full pl-10 pr-4 py-3.5 bg-white border border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 input-focus-ring transition-all text-sm"
                           placeholder="Masukkan username" />
                </div>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">Kata Sandi</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input type="password" id="password" value="password"
                           class="w-full pl-10 pr-4 py-3.5 bg-white border border-gray-200 rounded-xl text-gray-800 placeholder-gray-400 input-focus-ring transition-all text-sm"
                           placeholder="Kata sandi" />
                </div>
            </div>

            <!-- Lupa password -->
            <div class="flex justify-end">
                <a href="#" class="text-xs font-medium text-[#1a365d]/70 hover:text-[#1a365d] transition-colors">Lupa kata sandi?</a>
            </div>

            <!-- Tombol Login -->
            <button type="submit" id="loginBtn"
                    class="btn-primary w-full flex justify-center items-center gap-2 py-3.5 rounded-xl text-white font-semibold text-base shadow-md transition-all duration-200">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
                Masuk ke Sistem
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-6 text-center text-[0.6rem] text-gray-400/80 flex flex-wrap justify-center gap-1.5">
            <span>SRS · Sistem Manajemen Presensi SDM Kampus</span>
            <span class="text-gray-300">•</span>
            <span>v1.0</span>
        </div>
    </div>

    <!-- JavaScript Dummy -->
    <script>
        (function() {
            const usernameField = document.getElementById('username');
            const passwordField = document.getElementById('password');
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');

            const roleCredentials = {
                staf:    { username: 'dosen_rizki', password: 'staf123' },
                kaprodi: { username: 'kaprodi_si', password: 'kaprodi123' },
                osdm:    { username: 'osdm_utama', password: 'osdm123' },
                direktur: { username: 'direktur', password: 'direktur123' },
                admin:   { username: 'admin', password: 'admin123' },
                atasan:  { username: 'atasan_hr', password: 'atasan123' }
            };

            document.querySelectorAll('.role-quick-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const role = this.getAttribute('data-role');
                    const cred = roleCredentials[role];
                    if (cred) {
                        usernameField.value = cred.username;
                        passwordField.value = cred.password;
                    } else {
                        usernameField.value = 'user_demo';
                        passwordField.value = 'demo123';
                    }
                    passwordField.focus();
                    // visual feedback
                    this.style.borderColor = '#1a365d';
                    this.style.background = '#e6eff9';
                    setTimeout(() => {
                        this.style.borderColor = '#e5e9f0';
                        this.style.background = '#f8fafc';
                    }, 300);
                });
            });

            function handleLogin(e) {
                e.preventDefault();
                const username = usernameField.value.trim();
                const password = passwordField.value.trim();

                if (!username || !password) {
                    alert('⚠️ Harap isi username dan kata sandi.');
                    return;
                }

                let detectedRole = 'Pengguna';
                const lowerUser = username.toLowerCase();
                if (lowerUser.includes('admin')) detectedRole = 'Administrator Sistem';
                else if (lowerUser.includes('kaprodi')) detectedRole = 'Kaprodi';
                else if (lowerUser.includes('osdm')) detectedRole = 'OSDM';
                else if (lowerUser.includes('direktur')) detectedRole = 'Direktur';
                else if (lowerUser.includes('atasan')) detectedRole = 'Atasan Langsung';
                else if (lowerUser.includes('dosen') || lowerUser.includes('staf')) detectedRole = 'Staf / Dosen';

                alert(`✅ Login berhasil sebagai ${detectedRole}.\n\nSelamat datang di Sistem Presensi SDM Kampus.\n(Demo — tidak ada backend, halaman ini hanya simulasi.)`);

                const originalText = loginBtn.innerHTML;
                loginBtn.innerHTML = `
                    <svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Memproses...
                `;
                loginBtn.disabled = true;
                setTimeout(() => {
                    loginBtn.innerHTML = originalText;
                    loginBtn.disabled = false;
                }, 1200);
            }

            loginForm.addEventListener('submit', handleLogin);
            loginBtn.addEventListener('click', handleLogin);
        })();
    </script>
</body>
</html>
